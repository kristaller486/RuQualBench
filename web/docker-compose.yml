services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ruqualbench}
      POSTGRES_USER: ${POSTGRES_USER:-ruqualbench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ruqualbench}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ruqualbench} -d ${POSTGRES_DB:-ruqualbench}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ruqualbench-ui:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ..:/repo
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - IP_WHITELIST=${IP_WHITELIST:-}
      - LOGS_V2_DIR=/repo/logs_v2
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-ruqualbench}:${POSTGRES_PASSWORD:-ruqualbench}@postgres:5432/${POSTGRES_DB:-ruqualbench}
      - REPO_PATH=/repo
    restart: unless-stopped

volumes:
  postgres_data:
